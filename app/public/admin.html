<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Maidan Project — Admin Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink-950:#0A0D11;--ink-900:#0E1419;--ink-800:#161E26;--ink-700:#1F2933;
    --ink-200:#9AA5B0;--ink-100:#CBD5DE;--white:#FFFFFF;
    --br-700:#7A5424;--br-500:#A87436;--br-300:#C99A4E;--br-200:#DAB876;--br-100:#EAD2A0;
    --grad:linear-gradient(135deg,#EAD2A0 0%,#C99A4E 50%,#A87436 100%);
    --rule:#26323d;--ok:#6FA87A;--warn:#D8A24A;--err:#C56B5C;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Inter',sans-serif;background:var(--ink-900);color:var(--ink-100);min-height:100vh;-webkit-font-smoothing:antialiased;}
  .mono{font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.18em;font-size:10px;}

  header{border-bottom:1px solid var(--rule);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;background:var(--ink-950);position:sticky;top:0;z-index:10;}
  .wm{display:flex;align-items:center;gap:12px;}
  .wm .mark{width:38px;height:38px;border-radius:9px;overflow:hidden;display:block;flex-shrink:0;}
  .wm .mark img{width:100%;height:100%;display:block;object-fit:cover;}
  .wm .name{font-family:'Fraunces',serif;font-weight:500;font-size:17px;color:var(--white);}
  .wm .sub{font-size:11px;color:var(--br-300);letter-spacing:.2em;text-transform:uppercase;font-family:'JetBrains Mono',monospace;}
  .hdr-right{display:flex;align-items:center;gap:14px;}
  .user-badge{font-size:11px;color:var(--ink-200);}
  .btn{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;padding:9px 16px;border-radius:7px;cursor:pointer;border:1px solid var(--br-500);color:var(--br-100);background:transparent;}
  .btn:hover{filter:brightness(1.08);}
  .btn.primary{background:var(--grad);color:var(--ink-950);border:none;font-weight:500;}
  .btn.ghost{border-color:var(--rule);color:var(--ink-200);}
  .btn:disabled{opacity:.45;cursor:not-allowed;}

  .filters{padding:16px 24px;display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;border-bottom:1px solid var(--rule);background:var(--ink-950);}
  .fld{display:flex;flex-direction:column;gap:4px;}
  .fld label{font-size:9px;color:var(--ink-200);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.14em;}
  input[type=text],input[type=date],select{background:var(--ink-800);border:1px solid var(--rule);color:var(--ink-100);padding:8px 12px;border-radius:6px;font-family:'Inter',sans-serif;font-size:13px;min-width:140px;}
  input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.5);cursor:pointer;}
  input:focus,select:focus{outline:none;border-color:var(--br-500);}

  .stats{padding:12px 24px;display:flex;gap:24px;font-size:12px;color:var(--ink-200);border-bottom:1px solid var(--rule);flex-wrap:wrap;}
  .stats b{color:var(--br-100);font-family:'JetBrains Mono',monospace;}
  .stats .dup-warn{color:var(--warn);}

  .table-wrap{overflow-x:auto;padding:0 24px 100px;}
  table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px;}
  th{font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.12em;font-size:9px;color:var(--ink-200);font-weight:500;padding:10px 8px;text-align:left;border-bottom:1px solid var(--rule);white-space:nowrap;position:sticky;top:0;background:var(--ink-900);}
  td{padding:8px 8px;border-bottom:1px solid var(--rule);color:var(--ink-100);vertical-align:top;}
  tr:hover td{background:rgba(201,154,78,.03);}
  .narr-cell{min-width:240px;max-width:340px;}
  .narr-cell textarea{width:100%;background:var(--ink-800);border:1px solid var(--rule);color:var(--ink-100);border-radius:6px;font-size:12px;padding:6px 8px;font-family:'Inter',sans-serif;resize:vertical;min-height:60px;}
  .narr-cell textarea:focus{outline:none;border-color:var(--br-500);}
  .narr-save{margin-top:4px;font-size:10px;padding:4px 10px;}
  .narr-status{font-size:10px;margin-top:3px;min-height:14px;}
  .narr-status.ok{color:var(--ok);}
  .narr-status.err{color:var(--err);}

  /* Editable data cells */
  td.editable{cursor:pointer;position:relative;}
  td.editable:hover{background:rgba(201,154,78,.08);}
  td.editable input{width:60px;background:var(--ink-800);border:1px solid var(--br-500);color:var(--white);padding:3px 6px;border-radius:4px;font-size:12px;font-family:'JetBrains Mono',monospace;}
  td.edit-saved{animation:flash-ok .6s ease;}
  @keyframes flash-ok{0%{background:rgba(111,168,122,.3)}100%{background:transparent}}

  /* Checkbox styling */
  th.chk,td.chk{width:36px;text-align:center;}
  input[type=checkbox]{accent-color:var(--br-300);width:15px;height:15px;cursor:pointer;}

  .gen-bar{position:fixed;bottom:0;left:0;right:0;background:var(--ink-950);border-top:1px solid var(--rule);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;z-index:10;}
  .gen-status{font-size:12px;color:var(--ink-200);font-family:'JetBrains Mono',monospace;letter-spacing:.08em;}
  .gen-status.ok{color:var(--ok);}
  .gen-status.err{color:var(--err);}
  .gen-status a{color:var(--br-300);}
  .gen-info{font-size:11px;color:var(--ink-200);margin-left:8px;}
  .gen-info b{color:var(--br-100);font-family:'JetBrains Mono',monospace;}

  .empty{padding:48px 24px;text-align:center;color:var(--ink-200);font-size:14px;}
  .badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;font-family:'JetBrains Mono',monospace;letter-spacing:.05em;}
  .badge.full{background:rgba(111,168,122,.2);color:#9fd0aa;}
  .badge.mid{background:rgba(216,162,74,.15);color:#e0b960;}
  .badge.low{background:rgba(197,107,92,.15);color:#e7a99e;}
  .dup-badge{display:inline-block;padding:1px 6px;border-radius:3px;font-size:9px;font-family:'JetBrains Mono',monospace;background:rgba(216,162,74,.15);color:#e0b960;margin-left:4px;}
</style>
</head>
<body>
<header>
  <div class="wm">
    <div class="mark"><img src="/maidan-logo.png" alt="The Maidan Project"></div>
    <div>
      <div class="name">The Maidan Project</div>
      <div class="sub">Admin Dashboard</div>
    </div>
  </div>
  <div class="hdr-right">
    <span class="user-badge" id="userBadge"></span>
    <button class="btn ghost" onclick="logout()">Logout</button>
  </div>
</header>

<div class="filters">
  <div class="fld">
    <label>Session ID</label>
    <input type="text" id="fSession" placeholder="e.g. GNPS-M1-TOD-21JUN26">
  </div>
  <div class="fld">
    <label>Band</label>
    <select id="fBand"><option value="">All</option><option>Toddler</option><option>Sub Junior</option><option>Junior</option><option>Senior</option></select>
  </div>
  <div class="fld">
    <label>Coach</label>
    <input type="text" id="fCoach" placeholder="Coach name">
  </div>
  <div class="fld">
    <label>Date</label>
    <input type="date" id="fDate">
  </div>
  <button class="btn primary" onclick="loadData()" id="loadBtn">Load</button>
</div>

<div class="stats" id="statsBar" style="display:none;">
  Total: <b id="sTotal">0</b> &nbsp;·&nbsp;
  Complete: <b id="sComplete">0</b> &nbsp;·&nbsp;
  With narrative: <b id="sNarr">0</b> &nbsp;·&nbsp;
  Missing narrative: <b id="sMiss">0</b>
  <span id="sDupWarn" class="dup-warn" style="display:none;"></span>
</div>

<div class="table-wrap">
  <div class="empty" id="emptyMsg">Enter a session ID or filters above and click Load.</div>
  <table id="dataTable" style="display:none;">
    <thead>
      <tr>
        <th class="chk"><input type="checkbox" id="selectAll" title="Select all"></th>
        <th>Student</th><th>Band</th><th>Session</th><th>Date</th><th>Coach</th><th>Height</th><th>Weight</th>
        <th>P1</th><th>P2</th><th>P3</th><th>P4</th><th>P5</th><th>P6</th><th>P7</th>
        <th>Complete</th>
        <th class="narr-cell">Narrative</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div class="gen-bar">
  <div>
    <span class="gen-status" id="genStatus"></span>
    <span class="gen-info" id="genInfo"></span>
  </div>
  <button class="btn primary" id="genBtn" onclick="generatePDFs()" disabled>Generate PDFs</button>
</div>

<script>
let rawRows = [];
let currentRows = [];
let dupCount = 0;
let currentUser = null;
let selectedIds = new Set();

// ── Session check ────────────────────────────────────────────────
(async function(){
  try {
    const res = await fetch('/api/me', { credentials: 'same-origin' });
    if (!res.ok) { window.location.href = '/login'; return; }
    const data = await res.json();
    if (!data.ok || data.user.role !== 'admin') { window.location.href = '/login'; return; }
    currentUser = data.user;
    document.getElementById('userBadge').textContent = data.user.displayName;
  } catch(_) { window.location.href = '/login'; }
})();

async function logout() {
  await fetch('/api/logout', { method:'POST', credentials:'same-origin' });
  window.location.href = '/login';
}

// ── Completeness ─────────────────────────────────────────────────
function completeness(row) {
  let filled = 0, total = 2;
  if (row.height_cm !== '' && row.height_cm != null && row.height_cm !== 0 && row.height_cm !== '0') filled++;
  if (row.weight_kg !== '' && row.weight_kg != null && row.weight_kg !== 0 && row.weight_kg !== '0') filled++;
  for (let i = 1; i <= 7; i++) {
    if (row['p' + i + '_drill_id']) {
      total++;
      const v = row['p' + i + '_value'];
      if (v !== '' && v != null) filled++;
    }
  }
  const pct = total > 0 ? Math.round((filled / total) * 100) : 0;
  return { filled, total, pct };
}

// ── Dedup by student_id ──────────────────────────────────────────
function dedup(rows) {
  const byStudent = {};
  rows.forEach(r => {
    const sid = r.student_id;
    if (!sid) return;
    if (!byStudent[sid]) { byStudent[sid] = { best: r, dupes: [] }; return; }
    const existing = byStudent[sid].best;
    const existComp = completeness(existing).pct;
    const newComp = completeness(r).pct;
    if (newComp > existComp || (newComp === existComp && (r.exported_at || '') > (existing.exported_at || ''))) {
      byStudent[sid].dupes.push(existing);
      byStudent[sid].best = r;
    } else {
      byStudent[sid].dupes.push(r);
    }
  });
  const deduped = [];
  let totalDupes = 0;
  Object.values(byStudent).forEach(entry => {
    entry.best._dupCount = entry.dupes.length;
    deduped.push(entry.best);
    totalDupes += entry.dupes.length;
  });
  return { deduped, totalDupes };
}

// ── Load data ────────────────────────────────────────────────────
async function loadData() {
  const btn = document.getElementById('loadBtn');
  btn.disabled = true; btn.textContent = 'Loading…';

  const params = new URLSearchParams();
  const s = document.getElementById('fSession').value.trim();
  const b = document.getElementById('fBand').value;
  const c = document.getElementById('fCoach').value.trim();
  const d = document.getElementById('fDate').value.trim();
  if (s) params.set('session_id', s);
  if (b) params.set('band', b);
  if (c) params.set('coach', c);
  if (d) params.set('date', d);

  try {
    const res = await fetch('/api/data?' + params, { credentials:'same-origin' });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'Fetch failed');
    rawRows = data.rows || [];
    const result = dedup(rawRows);
    currentRows = result.deduped;
    dupCount = result.totalDupes;
    selectedIds = new Set(currentRows.filter(r => completeness(r).pct === 100).map(r => r.student_id));
    renderTable();
  } catch (err) {
    document.getElementById('emptyMsg').textContent = 'Error: ' + err.message;
    document.getElementById('emptyMsg').style.display = '';
    document.getElementById('dataTable').style.display = 'none';
  } finally {
    btn.disabled = false; btn.textContent = 'Load';
  }
}

// ── Select All ───────────────────────────────────────────────────
document.getElementById('selectAll').onchange = function() {
  if (this.checked) {
    currentRows.forEach(r => selectedIds.add(r.student_id));
  } else {
    selectedIds.clear();
  }
  document.querySelectorAll('.row-chk').forEach(cb => cb.checked = this.checked);
  updateGenInfo();
};

function toggleSelect(sid, checked) {
  if (checked) selectedIds.add(sid); else selectedIds.delete(sid);
  document.getElementById('selectAll').checked = selectedIds.size === currentRows.length;
  updateGenInfo();
}

// ── Render table ─────────────────────────────────────────────────
function renderTable() {
  const tbody = document.getElementById('tbody');
  const table = document.getElementById('dataTable');
  const empty = document.getElementById('emptyMsg');
  const stats = document.getElementById('statsBar');

  if (!currentRows.length) {
    empty.textContent = 'No rows found for those filters.';
    empty.style.display = ''; table.style.display = 'none'; stats.style.display = 'none';
    document.getElementById('genBtn').disabled = true;
    updateGenInfo();
    return;
  }

  empty.style.display = 'none'; table.style.display = ''; stats.style.display = '';

  const withNarr = currentRows.filter(r => r.narrative_text && r.narrative_text.trim()).length;
  const completeCount = currentRows.filter(r => completeness(r).pct === 100).length;
  document.getElementById('sTotal').textContent = currentRows.length;
  document.getElementById('sComplete').textContent = completeCount;
  document.getElementById('sNarr').textContent = withNarr;
  document.getElementById('sMiss').textContent = currentRows.length - withNarr;

  const dupWarn = document.getElementById('sDupWarn');
  if (dupCount > 0) {
    dupWarn.textContent = '· ' + dupCount + ' duplicate row' + (dupCount > 1 ? 's' : '') + ' collapsed';
    dupWarn.style.display = '';
  } else { dupWarn.style.display = 'none'; }

  document.getElementById('genBtn').disabled = selectedIds.size === 0;
  updateGenInfo();

  tbody.innerHTML = '';
  currentRows.forEach((row, i) => {
    const tr = document.createElement('tr');

    // Checkbox
    const chkTd = document.createElement('td');
    chkTd.className = 'chk';
    const chk = document.createElement('input');
    chk.type = 'checkbox'; chk.className = 'row-chk';
    chk.checked = selectedIds.has(row.student_id);
    chk.onchange = () => toggleSelect(row.student_id, chk.checked);
    chkTd.appendChild(chk);
    tr.appendChild(chkTd);

    // Student name (with dup badge)
    const nameTd = document.createElement('td');
    nameTd.textContent = row.student_name || row.student_id;
    if (row._dupCount > 0) {
      const db = document.createElement('span');
      db.className = 'dup-badge';
      db.textContent = '+' + row._dupCount + ' dup';
      db.title = row._dupCount + ' other row(s) collapsed. Showing most complete.';
      nameTd.appendChild(db);
    }
    tr.appendChild(nameTd);

    // Band, Session, Date, Coach (read-only)
    [row.band_label, row.session_id, row.combine_date || '', row.captured_by].forEach(v => {
      const td = document.createElement('td');
      td.textContent = v || '';
      tr.appendChild(td);
    });

    // Height + Weight (editable)
    makeEditableCell(tr, row, 'height_cm', 'number');
    makeEditableCell(tr, row, 'weight_kg', 'number');

    // P1-P7 values (editable)
    for (let p = 1; p <= 7; p++) {
      const key = 'p' + p + '_value';
      if (row['p' + p + '_drill_id']) {
        makeEditableCell(tr, row, key, 'number');
      } else {
        const td = document.createElement('td');
        td.textContent = '—';
        tr.appendChild(td);
      }
    }

    // Completeness badge
    const comp = completeness(row);
    const ctd = document.createElement('td');
    const cls = comp.pct === 100 ? 'full' : comp.pct >= 50 ? 'mid' : 'low';
    ctd.innerHTML = '<span class="badge ' + cls + '">' + comp.pct + '%</span> <span style="font-size:10px;color:var(--ink-200)">' + comp.filled + '/' + comp.total + '</span>';
    tr.appendChild(ctd);

    // Narrative cell
    const ntd = document.createElement('td');
    ntd.className = 'narr-cell';
    const ta = document.createElement('textarea');
    ta.value = row.narrative_text || '';
    ta.rows = 3;
    ntd.appendChild(ta);

    const saveBtn = document.createElement('button');
    saveBtn.className = 'btn narr-save';
    saveBtn.textContent = 'Save';
    saveBtn.onclick = () => saveNarrative(row, ta.value, statusDiv);
    ntd.appendChild(saveBtn);

    const statusDiv = document.createElement('div');
    statusDiv.className = 'narr-status';
    ntd.appendChild(statusDiv);

    tr.appendChild(ntd);
    tbody.appendChild(tr);
  });

  document.getElementById('selectAll').checked = selectedIds.size === currentRows.length;
}

// ── Editable data cell ───────────────────────────────────────────
function makeEditableCell(tr, row, key, type) {
  const td = document.createElement('td');
  td.className = 'editable';
  const val = row[key];
  td.textContent = (val !== '' && val != null) ? val : '—';
  td.title = 'Click to edit';

  td.onclick = function() {
    if (td.querySelector('input')) return; // already editing
    const inp = document.createElement('input');
    inp.type = type || 'text';
    inp.step = 'any';
    inp.value = (val !== '' && val != null) ? val : '';
    td.textContent = '';
    td.appendChild(inp);
    inp.focus();
    inp.select();

    function commit() {
      const newVal = inp.value.trim();
      row[key] = newVal === '' ? '' : (type === 'number' ? parseFloat(newVal) : newVal);
      td.textContent = newVal || '—';
      td.classList.add('edit-saved');
      setTimeout(() => td.classList.remove('edit-saved'), 700);
      // Recalculate completeness and update stats
      renderStats();
      // Save to HQ
      saveDataEdit(row, key, row[key]);
    }

    inp.onblur = commit;
    inp.onkeydown = function(e) {
      if (e.key === 'Enter') { inp.blur(); }
      if (e.key === 'Escape') { td.textContent = (val !== '' && val != null) ? val : '—'; }
    };
  };
  tr.appendChild(td);
}

function renderStats() {
  const withNarr = currentRows.filter(r => r.narrative_text && r.narrative_text.trim()).length;
  const completeCount = currentRows.filter(r => completeness(r).pct === 100).length;
  document.getElementById('sTotal').textContent = currentRows.length;
  document.getElementById('sComplete').textContent = completeCount;
  document.getElementById('sNarr').textContent = withNarr;
  document.getElementById('sMiss').textContent = currentRows.length - withNarr;
  updateGenInfo();
}

// ── Save data edit to HQ ─────────────────────────────────────────
// Re-sends the full row via the capture endpoint to update the sheet
async function saveDataEdit(row, key, value) {
  try {
    // Build a minimal row payload for UPSERT
    const payload = {
      student_id: row.student_id,
      session_id: row.session_id,
    };
    payload[key] = value;
    await fetch('/api/capture', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify([payload]),
    });
  } catch (err) {
    console.error('Failed to save edit:', err);
  }
}

// ── Gen bar info ─────────────────────────────────────────────────
function updateGenInfo() {
  const info = document.getElementById('genInfo');
  const btn = document.getElementById('genBtn');
  if (!currentRows.length) { info.textContent = ''; btn.disabled = true; return; }
  const selected = selectedIds.size;
  btn.disabled = selected === 0;
  if (selected === 0) {
    info.textContent = 'Select students to generate PDFs';
  } else {
    info.innerHTML = '<b>' + selected + '</b> student' + (selected > 1 ? 's' : '') + ' selected for PDF generation';
  }
}

// ── Save narrative ───────────────────────────────────────────────
async function saveNarrative(row, text, statusEl) {
  statusEl.textContent = 'Saving…'; statusEl.className = 'narr-status';
  try {
    const res = await fetch('/api/narrative', {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify({
        student_id: row.student_id,
        session_id: row.session_id,
        narrative_text: text,
        narrative_attribution: currentUser ? currentUser.displayName : '',
        band_label: row.band_label,
      }),
    });
    const data = await res.json();
    if (data.ok) {
      statusEl.textContent = '✓ Saved'; statusEl.className = 'narr-status ok';
      row.narrative_text = text;
      renderStats();
    } else {
      statusEl.textContent = data.error || 'Save failed'; statusEl.className = 'narr-status err';
    }
  } catch (err) {
    statusEl.textContent = 'Network error'; statusEl.className = 'narr-status err';
  }
}

// ── Generate PDFs ────────────────────────────────────────────────
let pollTimer = null;

async function generatePDFs() {
  const btn = document.getElementById('genBtn');
  const status = document.getElementById('genStatus');

  if (selectedIds.size === 0) {
    status.textContent = 'No students selected'; status.className = 'gen-status err';
    return;
  }

  const sessionId = currentRows.length ? currentRows[0].session_id : document.getElementById('fSession').value.trim();
  if (!sessionId) { status.textContent = 'No session ID'; status.className = 'gen-status err'; return; }

  const selectedNames = currentRows.filter(r => selectedIds.has(r.student_id)).map(r => r.student_name || r.student_id);
  if (!confirm('Generate PDFs for ' + selectedIds.size + ' student(s)?\n\n' + selectedNames.join('\n'))) return;

  btn.disabled = true; status.textContent = 'Dispatching…'; status.className = 'gen-status';

  try {
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify({ session_id: sessionId }),
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'Dispatch failed');

    if (data.run_id) {
      status.innerHTML = 'Dispatched — <a href="' + data.run_url + '" target="_blank">view run ↗</a>';
      localStorage.setItem('maidan_last_run_id', data.run_id);
      localStorage.setItem('maidan_last_run_url', data.run_url || '');
      pollStatus(data.run_id);
    } else {
      status.innerHTML = 'Dispatched — <a href="' + (data.run_url||'#') + '" target="_blank">check GitHub Actions ↗</a>';
      btn.disabled = false;
    }
  } catch (err) {
    status.textContent = err.message; status.className = 'gen-status err';
    btn.disabled = false;
  }
}

function pollStatus(runId) {
  const status = document.getElementById('genStatus');
  const btn = document.getElementById('genBtn');
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(async () => {
    try {
      const res = await fetch('/api/generate/status?run_id=' + runId, { credentials:'same-origin' });
      const data = await res.json();
      if (data.status === 'completed') {
        clearInterval(pollTimer);
        btn.disabled = false;
        if (data.conclusion === 'success') {
          status.innerHTML = '✓ Complete — <a href="' + data.run_url + '" target="_blank">download artifacts</a>';
          status.className = 'gen-status ok';
        } else {
          status.textContent = '✗ Failed (' + data.conclusion + ')';
          status.className = 'gen-status err';
        }
        localStorage.removeItem('maidan_last_run_id');
        localStorage.removeItem('maidan_last_run_url');
      } else {
        status.textContent = 'Status: ' + data.status + '…';
      }
    } catch (_) {
      status.textContent = 'Poll error — retrying…';
    }
  }, 5000);
}

// ── Restore run status from localStorage ─────────────────────────
(function(){
  const runId = localStorage.getItem('maidan_last_run_id');
  if (runId) {
    const status = document.getElementById('genStatus');
    const url = localStorage.getItem('maidan_last_run_url') || '';
    status.innerHTML = 'Resuming poll… ' + (url ? '<a href="' + url + '" target="_blank">view run ↗</a>' : '');
    pollStatus(runId);
  }
})();

// ── Seed date to today ───────────────────────────────────────────
document.getElementById('fDate').value = new Date().toLocaleDateString('en-CA');
</script>
