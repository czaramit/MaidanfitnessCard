<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Maidan Project — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink-950:#0A0D11;--ink-900:#0E1419;--ink-800:#161E26;--ink-700:#1F2933;
    --ink-200:#9AA5B0;--ink-100:#CBD5DE;--white:#FFFFFF;
    --br-700:#7A5424;--br-500:#A87436;--br-300:#C99A4E;--br-200:#DAB876;--br-100:#EAD2A0;
    --grad:linear-gradient(135deg,#EAD2A0 0%,#C99A4E 50%,#A87436 100%);
    --rule:#26323d;--err:#C56B5C;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Inter',sans-serif;background:var(--ink-950);color:var(--ink-100);
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    -webkit-font-smoothing:antialiased;}

  .card{background:var(--ink-800);border:1px solid var(--rule);border-radius:16px;
    padding:40px 36px 36px;width:100%;max-width:420px;}

  .brand{display:flex;align-items:center;gap:14px;margin-bottom:32px;}
  .brand .mark{width:48px;height:48px;border-radius:11px;overflow:hidden;flex-shrink:0;}
  .brand .mark img{width:100%;height:100%;display:block;object-fit:cover;}
  .brand .name{font-family:'Fraunces',serif;font-weight:500;font-size:20px;color:var(--white);line-height:1.2;}
  .brand .sub{font-size:11px;color:var(--br-300);letter-spacing:.2em;text-transform:uppercase;
    font-family:'JetBrains Mono',monospace;margin-top:3px;}

  .fld{display:flex;flex-direction:column;gap:6px;margin-bottom:18px;}
  .fld label{font-size:9px;color:var(--ink-200);font-family:'JetBrains Mono',monospace;
    text-transform:uppercase;letter-spacing:.16em;}
  .fld input{background:var(--ink-900);border:1px solid var(--rule);color:var(--ink-100);
    padding:12px 14px;border-radius:8px;font-family:'Inter',sans-serif;font-size:15px;width:100%;}
  .fld input:focus{outline:none;border-color:var(--br-500);}

  .btn{width:100%;padding:13px;border-radius:8px;border:none;cursor:pointer;
    font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.14em;
    text-transform:uppercase;font-weight:500;background:var(--grad);color:var(--ink-950);
    margin-top:6px;}
  .btn:hover{filter:brightness(1.06);}
  .btn:disabled{opacity:.5;cursor:not-allowed;}

  .err{font-size:12px;color:var(--err);margin-top:12px;min-height:18px;text-align:center;}
</style>
</head>
<body>
<div class="card">
  <div class="brand">
    <div class="mark"><img src="/img/maidan-logo.png" alt="The Maidan Project"></div>
    <div>
      <div class="name">The Maidan Project</div>
      <div class="sub">Fitness Card System</div>
    </div>
  </div>

  <form id="loginForm">
    <div class="fld">
      <label>Username</label>
      <input type="text" id="username" autocomplete="username" required autofocus>
    </div>
    <div class="fld">
      <label>Password</label>
      <input type="password" id="password" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn" id="submitBtn">Sign In</button>
    <div class="err" id="errMsg"></div>
  </form>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const err = document.getElementById('errMsg');
  btn.disabled = true; btn.textContent = 'Signing in…'; err.textContent = '';
  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('username').value,
        password: document.getElementById('password').value,
      }),
    });
    const data = await res.json();
    if (data.ok) {
      window.location.href = data.home;
    } else {
      err.textContent = data.error || 'Login failed';
    }
  } catch (ex) {
    err.textContent = 'Network error — try again';
  } finally {
    btn.disabled = false; btn.textContent = 'Sign In';
  }
});
</script>
</body>
</html>
